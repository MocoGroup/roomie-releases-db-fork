<div class="recommendation-card">

  <div class="card-top">
    <div class="avatar">{{ initial }}</div>

    <div class="card-info">
      <h3>{{ recommendation.name }}</h3>
      <span class="card-major">{{ recommendation.major }}</span>
    </div>
  </div>

  <!-- Barra líquida de compatibilidade -->
  <div class="compat-bar-wrapper">
    <div class="compat-bar-track">
      <div
        class="compat-bar-fill"
        [style.width.%]="recommendation.compatibilityPercentage"
        [style.background]="compatibilityGradient">
        <span class="bubble b1"></span>
        <span class="bubble b2"></span>
        <span class="bubble b3"></span>
        <span class="bubble b4"></span>
        <div class="wave"></div>
      </div>
    </div>
    <span class="compat-label" [style.color]="compatibilityColor">
      {{ recommendation.compatibilityPercentage }}% de compatibilidade
    </span>
  </div>

  <div *ngIf="recommendation.commonInterests.length > 0" class="tags-container">
    <span *ngFor="let tag of recommendation.commonInterests" class="interest-tag">
      {{ tag }}
    </span>
  </div>

  <div class="card-actions">
    <button class="btn-ignore" (click)="onIgnore($event)" title="Ignorar recomendação">
      <span class="material-icons" aria-hidden="true">visibility_off</span>
      Ignorar
    </button>
  </div>

</div>
