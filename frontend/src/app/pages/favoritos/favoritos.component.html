<app-header></app-header>

<div class="favoritos-page">

  <div class="page-header">
    <button class="btn-back" (click)="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Voltar
    </button>
    <h1>
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      Meus Favoritos
    </h1>
  </div>

  <!-- Lista vazia -->
  <div *ngIf="favorites.length === 0" class="empty-state">
    <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none"
      stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
    <p>Você ainda não demonstrou interesse em nenhum imóvel.</p>
    <button class="btn-explore" (click)="goBack()">Explorar imóveis</button>
  </div>

  <!-- Cards dos favoritos -->
  <div *ngIf="favorites.length > 0" class="favorites-grid">
    <div *ngFor="let fav of favorites" class="favorite-card" (click)="goToDetail(fav.id)">
      <div class="fav-info">
        <h3>{{ fav.titulo }}</h3>
        <span class="fav-type">{{ typeLabel(fav.tipo) }}</span>
        <p class="fav-location">{{ fav.bairro }}, {{ fav.cidade }} / {{ fav.estado }}</p>
        <span class="fav-price">R$ {{ fav.preco | number: '1.0-0' }}<span class="per-month">/mês</span></span>
      </div>
      <button class="btn-remove" (click)="removeFavorite(fav.id, $event)" title="Remover dos favoritos">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="#ef4444"
          stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
    </div>
  </div>

</div>
